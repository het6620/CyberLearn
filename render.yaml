databases:
  - name: cyberlearn-db
    plan: free

services:
  - type: web
    name: cyberlearn
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cyberlearn-db
          property: connectionString
